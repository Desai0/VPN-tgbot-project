services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: vpn-bot-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///app/data/vpn.db}
      HYSTERIA_API_URL: ${HYSTERIA_API_URL:-http://host.docker.internal:9999}
      HYSTERIA_API_TOKEN: ${HYSTERIA_API_TOKEN}
      HYSTERIA_SERVER_HOST: ${HYSTERIA_SERVER_HOST}
      HYSTERIA_SERVER_PORT: ${HYSTERIA_SERVER_PORT:-8443}
      HYSTERIA_SERVER_SNI: ${HYSTERIA_SERVER_SNI}
      HYSTERIA_SERVER_INSECURE: ${HYSTERIA_SERVER_INSECURE:-0}
      HYSTERIA_OBFS: ${HYSTERIA_OBFS:-}
      HYSTERIA_OBFS_PASSWORD: ${HYSTERIA_OBFS_PASSWORD:-}
      HYSTERIA_REQUEST_TIMEOUT_SECONDS: ${HYSTERIA_REQUEST_TIMEOUT_SECONDS:-10}
    ports:
      - "${BACKEND_BIND_IP:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    volumes:
      - vpn_backend_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  bot:
    build:
      context: ..
      dockerfile: bot/Dockerfile
    container_name: vpn-bot-telegram
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy

volumes:
  vpn_backend_data:
